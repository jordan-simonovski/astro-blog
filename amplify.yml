version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24 || nvm install 24
        - node -v
        - npm ci --prefer-offline --no-audit --no-fund
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - $HOME/.npm/**/*
